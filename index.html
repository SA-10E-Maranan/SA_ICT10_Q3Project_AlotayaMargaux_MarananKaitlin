<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Sign Up - Twisted Spellbound Tournament</title>
</head>
<style>
    body {
        background-image: url('bg2.jpg');
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
        background-attachment: fixed;
    }
    
    #account {
        background-color: rgba(80, 62, 85, 0.651)
    }
    
    h3, h6{
        font-family: DM Serif Display;
        color: rgb(250, 228, 255);
    }

    form {
        font-family: Raleway;
    }

    #signup {
        color: rgb(231, 216, 243);
        background-color: rgba(180, 105, 214, 0.801);
    }

    #output {
        font-family: Raleway;
        color: rgb(231, 216, 243)
    }

    .navbar {
        padding: 15px 30px;
        background: rgba(33, 9, 44, 0.678);
        backdrop-filter: blur(6px);
    }

    .navbar-brand,.nav-link {
        color: rgb(255, 255, 255) !important;
        
    }

    .navbar-brand {
        font-family: "DM Serif Display";
        font-weight: lighter;
        letter-spacing: 0.5px;
        font-size: clamp(1rem, 2.5vw, 1.6rem);
        margin-left: -30px;
    }

    .navbar-nav {
        gap: 10px;
    }

    .nav-link {
        font-family: Raleway;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 1px;
        position: relative;
        width: 135px;
    }

    .nav-link:hover {
        color: white !important;
    }

    .nav-link::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 0;
        background-color: white;
        transition: width 0.3s ease;
    }

    .nav-link:hover::after {
        width: 30%;
    }

    .parent-container {
        display: flex;
        justify-content: center;
        align-items: center;     
        min-height: 100vh;
        padding-top: 60px;           
    }
</style>
<body class="vh-100 justify-content-center align-items-center">
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid px-4">
    <div class="d-flex align-items-center flex-nowrap w-100">
      <a class="navbar-brand me-auto" href="index.html">
        N.R.C. Twisted Spellbound Tournament
      </a>
      <br>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="navbarNav" style="margin-left: 20px; margin-right: -80px;">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item" style="margin-right: -40px;">
          <a class="nav-link" href="index.html">Sign Up</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="teamchecker.html">Team Checker</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="players.html">Players</a>
        </li>
      </ul>
    </div>
</div>
</nav>
<div class="parent-container">
    <div class="card p-4" id="account" style="width: 350px;">
        <h3 class="text-center mb-4">Create an account to join the Tournament!</h3>
        <img src="nrc.webp">
        <form>
        <h6 class="text mb-4">Account details</h6>
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username">
            </div>

            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password">
            </div>
            <br>
        <h6 class="text mb-4">Profile information</h6>
            <div class="mb-3">
                <input type="text" id="firstname" class="form-control" placeholder="First Name">
            </div>

            <div class="mb-3">
                <input type="text" id="lastname" class="form-control" placeholder="Last Name">
            </div>

            <div class="mb-3">
                <select id="age"  style="width: 100%; padding: 5px; border-radius: 5px; border-color: rgba(0, 0, 0, 0.144); color: rgba(0, 0, 0, 0.685);">
                    <option value="">Age</option>
                    <option value="eleven">11</option>
                    <option value="twelve">12</option>
                    <option value="thirteen">13</option>
                    <option value="fourteen">14</option>
                    <option value="fifteen">15</option>
                    <option value="sixteen">16</option>
                </select>
            </div>

            <div class="mb-3">
                <select id="gender" style="width: 100%; padding: 5px; border-radius: 5px; border-color: rgba(0, 0, 0, 0.144); color: rgba(0, 0, 0, 0.699);"">
                    <option value="">Gender</option>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                    <option value="other">Other - e.g. Non-binary, Genderfluid</option>
                    <option value="pnts">Prefer not to say</option>
                </select>
            </div>
            <br>

            <div class="d-grid">
                <input type="button" py-click="account_creation" value="Sign up" class="btn btn-signup" id="signup">
            </div>
        
        </form>

        <div id="output" class="mt-3 text-center"></div>
    </div>
    </div>

    <py-script src="main2.py"></py-script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
