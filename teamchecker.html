<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- PyScript CSS -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Team Checker - Twisted Spellbound Tournament</title>
</head>
<style>
    body {
        background-image: url('bg.jpg');
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
        background-attachment: fixed;
    }

    #checker {
        background-color: rgba(59, 38, 77, 0.603);
        color: white;
    }

    h2 {
        font-family: DM Serif Display;
    }

    .mb-3 {
        font-family: Raleway;
    }
    
    .navbar {
        padding: 15px 30px;
        background: rgba(33, 9, 44, 0.678);
        backdrop-filter: blur(6px);
    }

    .navbar-brand,.nav-link {
        color: rgb(255, 255, 255) !important;
        
    }

    .navbar-brand {
        font-family: "DM Serif Display";
        font-weight: lighter;
        letter-spacing: 0.5px;
        font-size: clamp(1rem, 2.5vw, 1.6rem);
        margin-left: -30px;
    }

    .navbar-nav {
        gap: 10px;
    }

    .nav-link {
        font-family: Raleway;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 1px;
        position: relative;
        width: 135px;
    }

    .nav-link:hover {
        color: white !important;
    }

    .nav-link::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 0;
        background-color: white;
        transition: width 0.3s ease;
    }

    .nav-link:hover::after {
        width: 30%;
    }

    .parent-container {
        display: flex;
        justify-content: center;
        align-items: center;     
        min-height: 100vh;
        padding-top: 60px;     
    }

    img {
       display: block;
       margin-left: auto;
       margin-right: auto;
       margin-bottom: 20px;
    }

    #signup {
        color: rgb(231, 216, 243);
        background-color: rgba(180, 105, 214, 0.801);
    }
</style>
<body class="vh-100 justify-content-center align-items-center">
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid px-4">
    <div class="d-flex align-items-center flex-nowrap w-100">
      <a class="navbar-brand me-auto" href="index.html">
        N.R.C. Twisted Spellbound Tournament
      </a>
      <br>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="navbarNav" style="margin-left: 20px; margin-right: -80px;">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item" style="margin-right: -40px;">
          <a class="nav-link" href="index.html">Sign Up</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="teamchecker.html">Team Checker</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="players.html">Players</a>
        </li>
      </ul>
    </div>
</div>
</nav>
<div class="parent-container">
    <div class="card p-4 w-50" id="checker">
        <h2 class="text-center mb-4">Twisted Tournament Team Checker</h2>
        <div>
        <img src="coffin.webp" height="220" width="115">
        </div>
        <form>
            <div class="mb-3">
                <label class="form-label">Are you done with the online registration?</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="registered" name="registration" value="registered">
                    <label class="form-check-label" for="registered">Yes</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="notRegistered" name="registration" value="notRegistered">
                    <label class="form-check-label" for="notRegistered">No</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Do you have the medical clearance from the clinic?</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="cleared" name="clearance" value="cleared">
                    <label class="form-check-label" for="cleared">Yes</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="notCleared" name="clearance" value="notCleared">
                    <label class="form-check-label" for="notCleared">No</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">What's your Grade & Section?</label><br>
                <select id="level" class="form-select mb-2">
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>
                <select id="section" class="form-select">
                    <option value='emerald'>Emerald</option>
                    <option value='ruby'>Ruby</option>
                    <option value='sapphire'>Sapphire</option>
                    <option value='topaz'>Topaz</option>
                </select>
            </div>

            <div class="d-grid">
                <button type="button" py-click="intrams_checker" style="border-radius: 5px; font-family: Raleway; padding: 5px;" id="signup">Sign Up</button>
            </div>
        </form>
        <center>
        <div id="output" class="mt-3 center-container"></div>
        <div id="image" class="mt-3 center-container"></div>
        </center>
    </div>
    </div>

    <py-script src="main3.py"></py-script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
